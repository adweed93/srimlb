  // Determine how many pitches to skip (already shown)
  let skipCount = 0;
  if (_boxAbIndex === _lastAnimatedAbIndex) {
    skipCount = _lastAnimatedPitchCount;
  }

  // If nothing new to animate, just render final state
  if (skipCount >= pitches.length) {
    if (zone) zone.innerHTML = renderStrikeZone(pitches, pitches[pitches.length-1]);
    const last = pitches[pitches.length-1];
    renderAbCount(last.balls||0, last.strikes||0, last.outs||0);
    renderPitchLog(pitches, ab.event);
    if (ab.runners) renderAbDiamond(ab.runners);
    const scoreEl = document.getElementById('ab-score');
    if (scoreEl) scoreEl.textContent = `${ab.away_abbr||''} ${ab.away_score??0} - ${ab.home_score??0} ${ab.home_abbr||''}`;
    _lastAnimatedAbIndex = _boxAbIndex;
    _lastAnimatedPitchCount = pitches.length;
    return;
  }

  // Mark tracking now so refresh won't restart animation
  _lastAnimatedAbIndex = _boxAbIndex;
  _lastAnimatedPitchCount = pitches.length;

  // Show already-seen pitches instantly
  if (skipCount > 0) {
    const shown = pitches.slice(0, skipCount);
    if (zone) zone.innerHTML = renderStrikeZone(shown, shown[shown.length-1]);
    const lastSeen = shown[shown.length-1];
    renderAbCount(lastSeen.balls||0, lastSeen.strikes||0, lastSeen.outs||0);
    renderPitchLog(shown, ab.event);
  } else {
    if (zone) zone.innerHTML = renderStrikeZone([], null);
    renderAbCount(0, 0, 0);
    renderPitchLog([], ab.event);
  }

  let i = skipCount;
  const animSpeed = (_boxAbIndex === _boxAtBats.length - 1) ? 400 : 1500;
  _abAnimTimer = setInterval(() => {
    if (i >= pitches.length) {
      clearInterval(_abAnimTimer); _abAnimTimer = null;
      _lastAnimatedAbIndex = _boxAbIndex;
      _lastAnimatedPitchCount = pitches.length;
      // Show final runners and update score
      if (ab.runners) renderAbDiamond(ab.runners);
      const scoreEl = document.getElementById('ab-score');
      if (scoreEl) scoreEl.textContent = `${ab.away_abbr||''} ${ab.away_score??0} - ${ab.home_score??0} ${ab.home_abbr||''}`;
      return;
    }
    const shown = pitches.slice(0, i+1);
    if (zone) zone.innerHTML = renderStrikeZone(shown, shown[shown.length-1]);
    renderAbCount(pitches[i].balls||0, pitches[i].strikes||0, pitches[i].outs||0);
    renderPitchLog(shown, ab.event);
    i++;
  }, animSpeed);
}

function abNav(dir) {
  if (!_boxAtBats.length) return;
  const newIdx = Math.max(0, Math.min(_boxAtBats.length - 1, _boxAbIndex + dir));
  if (newIdx !== _boxAbIndex) {
    _lastAnimatedAbIndex = -1;
    _lastAnimatedPitchCount = 0;
  }
  _boxAbIndex = newIdx;
  renderSelectedAtBat();
}
function abGoLive() {
  if (_boxAbIndex >= _boxAtBats.length - 1) return;
  _boxAbIndex = _boxAtBats.length - 1;
  _lastAnimatedAbIndex = _boxAbIndex;
  _lastAnimatedPitchCount = (_boxAtBats[_boxAbIndex].pitch_sequence || []).length;
  renderSelectedAtBat();
}

function buildInningNav() {
  const nav = document.getElementById('ab-inning-nav');
  if (!nav || !_boxAtBats.length) return;
  const tops = [], bots = [];
  _boxAtBats.forEach((ab, i) => {
    const arr = ab.half==='top' ? tops : bots;
    if (!arr.length || arr[arr.length-1].inning !== ab.inning) {
      arr.push({inning: ab.inning, idx: i});
    }
  });
  const cols = Math.max(tops.length, bots.length);
  let html = `<div style="display:grid;grid-template-columns:repeat(${cols},20px);gap:0;text-align:center">`;
  tops.forEach(inn => { html += `<span data-inn="top${inn.inning}" onclick="jumpToInning(${inn.idx})" style="cursor:pointer;color:var(--muted);font-size:9px">▲${inn.inning}</span>`; });
  for (let i = tops.length; i < cols; i++) html += '<span></span>';
  bots.forEach(inn => { html += `<span data-inn="bot${inn.inning}" onclick="jumpToInning(${inn.idx})" style="cursor:pointer;color:var(--muted);font-size:9px">▼${inn.inning}</span>`; });
  html += '</div>';
  nav.innerHTML = html;
}

function highlightInningNav() {
  const nav = document.getElementById('ab-inning-nav');
  if (!nav || !_boxAtBats.length) return;
  const ab = _boxAtBats[_boxAbIndex];
  const key = (ab.half==='top'?'top':'bot') + ab.inning;
  nav.querySelectorAll('span[data-inn]').forEach(el => {
    el.style.color = el.dataset.inn === key ? 'var(--green)' : 'var(--muted)';
    el.style.fontWeight = el.dataset.inn === key ? '700' : '400';
  });
}

function jumpToInning(idx) {
  _boxAbIndex = idx;
  _lastAnimatedAbIndex = -1;
  _lastAnimatedPitchCount = 0;
  renderSelectedAtBat();
}

async function loadAtBatScroller(gameId) {
  const el = document.getElementById(`ab-scroller-${gameId}`);
  if (!el) return;
  try {
    const r = await fetch(`/api/game/${gameId}/plays`);
    const d = await r.json();
    if (!d.plays || !d.plays.length) { el.innerHTML = '<div style="color:var(--muted);font-size:12px;padding:8px">No play data available</div>'; return; }
    _boxAtBats = d.plays;
    _boxAbIndex = d.plays.length - 1; // default to most recent
    _lastAnimatedAbIndex = -1;
    _lastAnimatedPitchCount = 0;
    el.innerHTML = `<div style="display:flex;align-items:center;gap:12px;justify-content:center">
      <button id="ab-prev-btn" onclick="abNav(-1)" style="background:var(--card);border:1px solid var(--border);color:var(--text);border-radius:8px;width:36px;height:36px;font-size:18px;cursor:pointer">◀</button>
      <div id="ab-card-display" style="flex:1;max-width:300px"></div>
      <button id="ab-next-btn" onclick="abNav(1)" style="background:var(--card);border:1px solid var(--border);color:var(--text);border-radius:8px;width:36px;height:36px;font-size:18px;cursor:pointer">▶</button>
    </div>
    <div id="ab-counter" style="text-align:center;font-size:10px;color:var(--muted);margin-top:6px"></div>
    <div id="ab-inning-nav" style="display:flex;flex-direction:column;align-items:center;gap:2px;margin-top:6px"></div>`;
    buildInningNav();
    renderSelectedAtBat();
  } catch(e) { el.innerHTML = ''; }
}
function buildLinescoreTable(d) {
  const lt = d.linescore_table;
  if (!lt || !lt.innings || !lt.innings.length) return `<pre style="padding:12px;font-size:11px;color:var(--text);white-space:pre;font-family:monospace;margin:0">${d.linescore}</pre>`;
  const c = 'padding:4px 6px;border:1px solid var(--border);text-align:center;font-size:11px;font-family:\'SF Mono\',\'Fira Code\',monospace;min-width:22px';
  const h = 'padding:4px 6px;border:1px solid var(--border);text-align:center;font-size:10px;color:var(--muted);font-weight:600;min-width:22px';
  const t = 'padding:4px 6px;border:1px solid var(--border);text-align:left;font-size:11px;font-weight:600;white-space:nowrap';
  const rowH = 'height:26px';
  const innings = [...lt.innings];
  while (innings.length < 9) innings.push({num: innings.length + 1, away: '', home: ''});
  let tbl = '<table style="border-collapse:collapse;width:100%"><tr>';
  tbl += `<td style="${h};${rowH}">&nbsp;</td>`;
  innings.forEach(inn => { tbl += `<td style="${h};${rowH}">${inn.num}</td>`; });
  tbl += `<td style="${h};${rowH}">R</td><td style="${h};${rowH}">H</td><td style="${h};${rowH}">E</td></tr>`;
  tbl += `<tr><td style="${t};${rowH}">${teamLogo(d.away_id,20)}</td>`;
  innings.forEach(inn => { tbl += `<td style="${c};${rowH}">${inn.away!==''?inn.away:'-'}</td>`; });
  tbl += `<td style="${c};font-weight:700;${rowH}">${lt.away.r}</td><td style="${c};${rowH}">${lt.away.h}</td><td style="${c};${rowH}">${lt.away.e}</td></tr>`;
  tbl += `<tr><td style="${t};${rowH}">${teamLogo(d.home_id,20)}</td>`;
  innings.forEach(inn => { tbl += `<td style="${c};${rowH}">${inn.home!==''?inn.home:'-'}</td>`; });
  tbl += `<td style="${c};font-weight:700;${rowH}">${lt.home.r}</td><td style="${c};${rowH}">${lt.home.h}</td><td style="${c};${rowH}">${lt.home.e}</td></tr></table>`;
  return tbl;
}

function buildBattingTable(batters, teamId, teamName) {
  let html = `<div class="section-header">${teamLogo(teamId)} ${teamName} — Batting</div>`;
  html += `<div class="player-card" style="overflow-x:auto"><table style="width:100%;font-size:12px;border-collapse:collapse">`;
  html += `<tr style="color:var(--muted);text-align:center;border-bottom:1px solid var(--border)"><th style="text-align:left;padding:8px">Batter</th><th>AB</th><th>R</th><th>H</th><th>RBI</th><th>BB</th><th>K</th><th>AVG</th></tr>`;
  batters.forEach(b => {
    html += `<tr style="border-bottom:1px solid var(--border);text-align:center"><td style="text-align:left;padding:8px;font-weight:500;cursor:pointer" onclick="loadPlayer(${b.id})">${playerImg(b.id,20)} ${b.name} <span style="color:var(--muted);font-size:10px">${b.pos}</span></td><td>${b.ab}</td><td>${b.r}</td><td>${b.h}</td><td>${b.rbi}</td><td>${b.bb}</td><td>${b.k}</td><td style="color:var(--muted)">${b.avg}</td></tr>`;
  });
  html += `</table></div>`;
  return html;
}

function buildPitchingTable(pitchers, teamId, teamName) {
  let html = `<div class="section-header">${teamLogo(teamId)} ${teamName} — Pitching</div>`;
  html += `<div class="player-card" style="overflow-x:auto"><table style="width:100%;font-size:12px;border-collapse:collapse">`;
  html += `<tr style="color:var(--muted);text-align:center;border-bottom:1px solid var(--border)"><th style="text-align:left;padding:8px">Pitcher</th><th>IP</th><th>H</th><th>R</th><th>ER</th><th>BB</th><th>K</th><th>ERA</th></tr>`;
  pitchers.forEach(p => {
    html += `<tr style="border-bottom:1px solid var(--border);text-align:center"><td style="text-align:left;padding:8px;font-weight:500;cursor:pointer" onclick="loadPlayer(${p.id})">${playerImg(p.id,20)} ${p.name}</td><td>${p.ip}</td><td>${p.h}</td><td>${p.r}</td><td>${p.er}</td><td>${p.bb}</td><td>${p.k}</td><td style="color:var(--muted)">${p.era}</td></tr>`;
  });
  html += `</table></div>`;
  return html;
}

function renderLiveBatterCard(lr) {
  const el = document.getElementById('box-live-batter');
  if (!el || !lr.available || !lr.batter_id) { if (el) el.style.display='none'; return; }
  const s = lr.batter_stats || {};
  const statLine = s.ab !== undefined ? `${s.h}-${s.ab}, ${s.r} R, ${s.rbi} RBI${s.hr?' | '+s.hr+' HR':''}${s.bb?' | '+s.bb+' BB':''}${s.k?' | '+s.k+' K':''}` : '';
  el.style.display = 'block';
  if (el.dataset.batterId !== String(lr.batter_id)) {
    el.dataset.batterId = lr.batter_id;
    el.innerHTML = `<div style="display:flex;align-items:center;gap:12px">
      ${playerImg(lr.batter_id, 44)}
      <div style="flex:1">
        <div style="font-weight:700;font-size:14px;color:var(--text)" onclick="loadPlayer(${lr.batter_id})" class="clickable">${lr.batter}</div>
        <div class="lb-meta" style="font-size:11px;color:var(--muted)">vs ${lr.pitcher} • ${lr.inning_half==='Top'?'▲':'▼'}${lr.inning}</div>
        <div class="lb-stats" style="font-size:12px;color:var(--green);margin-top:2px">${statLine}</div>
      </div>
    </div>`;
  } else {
    const meta = el.querySelector('.lb-meta');
    if (meta) meta.textContent = `vs ${lr.pitcher} • ${lr.inning_half==='Top'?'▲':'▼'}${lr.inning}`;
    const stats = el.querySelector('.lb-stats');
    if (stats) stats.textContent = statLine;
  }
}

async function refreshBoxScoreData(gameId) {
  if (_boxAbortCtrl) _boxAbortCtrl.abort();
  _boxAbortCtrl = new AbortController();
  const sig = _boxAbortCtrl.signal;
  try {
    const br = await fetch(`/api/game/${gameId}/boxscore`, {signal:sig}).then(r=>r.json());
    if (!br.available) return;
    // Update linescore
    const ls = document.getElementById('box-linescore');
    if (ls) ls.innerHTML = buildLinescoreTable(br);
    // Update tables
    const tb = document.getElementById('box-tables');
    if (tb) tb.innerHTML = buildBattingTable(br.away_batters, br.away_id, br.away_team) + buildBattingTable(br.home_batters, br.home_id, br.home_team) + buildPitchingTable(br.away_pitchers, br.away_id, br.away_team) + buildPitchingTable(br.home_pitchers, br.home_id, br.home_team);
    // Refresh at-bat data without resetting selection
    const pr = await fetch(`/api/game/${gameId}/plays`, {signal:sig}).then(r=>r.json()).catch(()=>null);
    if (pr && pr.plays && pr.plays.length) {
      const wasAtEnd = _boxAbIndex === _boxAtBats.length - 1;
      const prevLen = _boxAtBats.length;
      _boxAtBats = pr.plays;
      if (wasAtEnd && pr.plays.length > prevLen) {
        // New at-bat appeared — clear visuals immediately, then animate
        _boxAbIndex = _boxAtBats.length - 1;
        _lastAnimatedAbIndex = -1;
        _lastAnimatedPitchCount = 0;
        if (_abAnimTimer) { clearInterval(_abAnimTimer); _abAnimTimer = null; }
        const zone = document.getElementById('ab-strike-zone');
        if (zone) zone.innerHTML = renderStrikeZone([], null);
        renderAbCount(0, 0, 0);
        renderPitchLog([], null);
        const svg = document.getElementById('ab-diamond-svg');
        if (svg) { svg.querySelector('#base-1').setAttribute('fill','#333'); svg.querySelector('#base-2').setAttribute('fill','#333'); svg.querySelector('#base-3').setAttribute('fill','#333'); }
        renderSelectedAtBat();
      } else if (wasAtEnd) {
        // Same at-bat but maybe new pitches
        _boxAbIndex = _boxAtBats.length - 1;
        const currentPitches = (_boxAtBats[_boxAbIndex].pitch_sequence || []).length;
        if (currentPitches !== _lastAnimatedPitchCount && !_abAnimTimer) {
          renderSelectedAtBat();
        }
      } else {
        _boxAbIndex = Math.min(_boxAbIndex, _boxAtBats.length - 1);
        // Don't re-render if user is browsing history or animation is playing
      }
    }
  } catch(e) {}
}

async function renderBoxScore(gameId) {
  _boxGameId = gameId;
  const r = await fetch(`/api/game/${gameId}/boxscore`);
  const d = await r.json();
  if (!d.available) { document.getElementById('scores-content').innerHTML = '<div class="empty-state"><div>Box score unavailable</div></div>'; return; }

  let html = backBtn();
  // Linescore container
  html += `<div id="box-linescore" class="player-card" style="overflow-x:auto;min-height:80px;padding:8px">${buildLinescoreTable(d)}</div>`;
  // Live current batter card
  html += `<div id="box-live-batter" class="player-card" style="padding:12px;display:none"></div>`;
  // Diamond + Strike Zone container (stacked vertically for mobile)
  html += `<div class="player-card" style="padding:12px;position:relative">`;
  html += `<div id="ab-live-btn" onclick="abGoLive()" style="position:absolute;top:8px;left:12px;font-size:9px;font-weight:700;cursor:pointer;padding:3px 8px;border-radius:10px;background:var(--red);color:#fff;box-shadow:0 0 6px var(--red);transition:all .3s">● LIVE</div>`;
  html += `<div id="ab-matchup" style="text-align:center;font-size:11px;margin-bottom:8px;height:16px"><span style="font-weight:600;color:var(--text)"></span></div>`;
  html += `<div style="display:flex;align-items:center;justify-content:center;gap:16px">`;
  html += `<div id="box-diamond" style="width:100px;height:105px"></div>`;
  html += `<div id="ab-strike-zone" style="width:140px;height:160px"></div>`;
  html += `</div>`;
  html += `<div id="ab-pitch-log" style="height:80px;overflow-y:auto;padding:6px 12px;border-top:1px solid var(--border);margin-top:8px;font-family:'SF Mono','Fira Code',monospace;display:flex;flex-direction:column;align-items:center"></div>`;
  html += `</div>`;
  // At-Bat nav
  html += `<div class="section-header">At-Bat Play-by-Play</div>`;
  html += `<div id="ab-scroller-${gameId}" class="player-card" style="padding:12px;min-height:160px"><div class="empty-state" style="padding:16px"><div class="icon">⏳</div></div></div>`;
  // Tables container
  html += `<div id="box-tables">`;
  html += buildBattingTable(d.away_batters, d.away_id, d.away_team);
  html += buildBattingTable(d.home_batters, d.home_id, d.home_team);
  html += buildPitchingTable(d.away_pitchers, d.away_id, d.away_team);
  html += buildPitchingTable(d.home_pitchers, d.home_id, d.home_team);
  html += `</div>`;
  // External links
  html += `<div class="player-card" style="margin-top:8px"><a href="https://www.mlb.com/gameday/${gameId}" target="_blank" style="display:block;padding:12px 16px;color:var(--blue);text-decoration:none;font-weight:600;font-size:13px">View on MLB.com →</a></div>`;

  document.getElementById('scores-content').innerHTML = html;

  // Populate live batter card immediately
  fetch(`/api/game/${gameId}/live`).then(r=>r.json()).then(lr => renderLiveBatterCard(lr)).catch(()=>{});

  // Load at-bats (this also renders strike zone for selected ab)
  await loadAtBatScroller(gameId);
}

// Notifications
async function loadNotifs() {
  const r = await fetch('/api/notifications');
  const d = await r.json();
  if (!d.length) {
    document.getElementById('notif-content').innerHTML = `<div class="empty-state"><div class="icon">🔔</div><div class="title">No Alerts Yet</div><div>You'll be notified when your favorites<br>do something statistically anomalous</div><div style="margin-top:16px;color:var(--gold)">👑 Gold = All-time historic territory</div></div>`;
    return;
  }
  document.getElementById('notif-content').innerHTML = d.map(n =>
    `<div class="notif-item ${n.category||'alert'}"><div class="msg">${n.message}</div><div class="time">${n.time}</div></div>`
  ).join('');
}
async function checkNotifs() { await fetch('/api/notifications'); loadNotifs(); }
async function clearNotifs() { await fetch('/api/notifications/clear',{method:'POST'}); loadNotifs(); }

// Auto-refresh
let _scoresRefreshTimer = null;
function scheduleScoresRefresh() {
  _scoresRefreshTimer = setTimeout(async () => {
    if (document.querySelector('#scores.active') && !window._viewingHistory) await loadScores();
    scheduleScoresRefresh();
  }, 6000);
}
scheduleScoresRefresh();
loadScores();

// Prefetch favorite players in background after initial load
setTimeout(async () => {
  try {
    const r = await fetch('/api/favorites');
    const favs = await r.json();
    for (const p of favs.players.slice(0, 5)) {
      fetch(`/api/player/${p.id}`).then(r => r.json()).then(d => {
        _playerCache[p.id] = {data: d, ts: Date.now()};
      }).catch(() => {});
    }
  } catch(e) {}
}, 500);
</script>
