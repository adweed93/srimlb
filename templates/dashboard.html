<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#000000">
<title>MLB Dashboard</title>
<style>
:root { --bg: #000000; --card: #111111; --border: #222222; --accent: #00ff87; --gold: #ffbe0b; --green: #00ff87; --red: #ff006e; --text: #f0f0f0; --muted: #666666; --blue: #00bbff; }
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding-bottom: 60px; }

/* Bottom Nav */
.bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; display: flex; background: #000; border-top: 1px solid var(--border); z-index: 1000; padding-bottom: env(safe-area-inset-bottom); }
.nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 10px 4px 6px; cursor: pointer; transition: all 0.2s; color: var(--muted); font-size: 9px; gap: 3px; text-transform: uppercase; letter-spacing: 1px; font-weight: 700; }
.nav-item.active { color: var(--accent); text-shadow: 0 0 10px var(--accent); }
.nav-item .icon { font-size: 20px; }

/* Header */
.header { position: sticky; top: 0; background: #000; padding: 14px 16px 10px; z-index: 99; border-bottom: 1px solid var(--border); }
.header h1 { font-size: 20px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }
.header .subtitle { font-size: 11px; color: var(--muted); font-family: 'SF Mono', 'Fira Code', monospace; }

/* Panels */
.panel { display: none; }
.panel.active { display: block; }

/* Game Cards */
.game-card { background: var(--card); border-radius: 6px; margin: 8px 12px; overflow: hidden; border: 1px solid var(--border); }
.game-card .game-status { padding: 6px 12px; font-size: 11px; font-weight: 700; color: var(--muted); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; text-transform: uppercase; letter-spacing: 0.5px; }
.game-card .game-status .live-dot { color: var(--red); animation: blink 1.2s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
.team-row { display: flex; align-items: center; padding: 10px 12px; gap: 10px; }
.team-row .team-name { flex: 1; font-size: 14px; font-weight: 600; }
.team-row .team-score { font-size: 20px; font-weight: 800; min-width: 30px; text-align: right; font-family: 'SF Mono', 'Fira Code', monospace; }
.team-row .team-score.winner { color: var(--text); }
.team-row .team-score.loser { color: var(--muted); }
.team-row + .team-row { border-top: 1px solid var(--border); }
.fav-badge { font-size: 10px; color: var(--gold); }

/* Section Headers */
.section-header { padding: 16px 16px 8px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; color: var(--muted); }

/* Stat Cards */
.player-card { background: var(--card); border-radius: 6px; margin: 8px 12px; border: 1px solid var(--border); overflow: hidden; }
.player-header { padding: 16px; border-bottom: 1px solid var(--border); }
.player-header .name { font-size: 18px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; }
.player-header .meta { font-size: 11px; color: var(--muted); margin-top: 2px; font-family: 'SF Mono', 'Fira Code', monospace; }
.stat-row { display: grid; grid-template-columns: repeat(3, 1fr); }
.stat-cell { padding: 14px 8px; text-align: center; border-bottom: 1px solid var(--border); border-right: 1px solid var(--border); }
.stat-cell:nth-child(3n) { border-right: none; }
.stat-cell .val { font-size: 20px; font-weight: 800; font-family: 'SF Mono', 'Fira Code', monospace; color: var(--accent); }
.stat-cell .lbl { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-top: 2px; }
.stat-cell.highlight .val { color: var(--accent); text-shadow: 0 0 8px var(--accent); }

/* Record bar */
.record-bar { display: flex; justify-content: space-around; padding: 12px; background: var(--card); border-radius: 6px; margin: 8px 12px; border: 1px solid var(--border); }
.record-item { text-align: center; }
.record-item .val { font-size: 22px; font-weight: 800; font-family: 'SF Mono', 'Fira Code', monospace; color: var(--accent); }
.record-item .lbl { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }

/* Game log */
.game-log-item { display: flex; align-items: center; padding: 12px 16px; border-bottom: 1px solid var(--border); }
.game-log-item .result { width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 800; margin-right: 12px; }
.game-log-item .result.W { background: var(--green); color: #000; box-shadow: 0 0 6px var(--green); }
.game-log-item .result.L { background: var(--red); color: #fff; box-shadow: 0 0 6px var(--red); }
.game-log-item .info { flex: 1; }
.game-log-item .info .opp { font-size: 14px; font-weight: 600; }
.game-log-item .info .date { font-size: 11px; color: var(--muted); }
.game-log-item .score { font-size: 14px; font-weight: 700; }

/* Anomaly banners */
.anomaly { margin: 8px 12px; padding: 12px 14px; border-radius: 6px; font-weight: 600; font-size: 13px; }
.anomaly.alert { background: #001a33; border-left: 3px solid var(--blue); box-shadow: inset 0 0 20px rgba(0,187,255,0.05); }
.anomaly.alltime { background: #1a1200; border-left: 3px solid var(--gold); color: var(--gold); box-shadow: inset 0 0 20px rgba(255,190,11,0.05); }
.anomaly.bad { background: #1a0a00; border-left: 3px solid #ff6b35; color: #ff6b35; box-shadow: inset 0 0 20px rgba(255,107,53,0.05); }
.anomaly.terrible { background: #1a0000; border-left: 3px solid #ff3333; color: #ff3333; box-shadow: inset 0 0 20px rgba(255,51,51,0.05); }

/* Search */
.search-container { padding: 12px; }
.search-bar { display: flex; gap: 8px; }
.search-bar input { flex: 1; padding: 12px 14px; border-radius: 6px; border: 1px solid var(--border); background: var(--card); color: var(--text); font-size: 15px; }
.search-bar input:focus { border-color: var(--accent); outline: none; box-shadow: 0 0 8px rgba(0,255,135,0.2); }
.search-bar input::placeholder { color: var(--muted); }
.search-btns { display: flex; gap: 6px; margin-top: 8px; }
.search-btns button { flex: 1; padding: 10px; border-radius: 6px; border: 1px solid var(--border); background: var(--card); color: var(--text); font-weight: 700; font-size: 12px; cursor: pointer; text-transform: uppercase; letter-spacing: 0.5px; }
.search-btns button:active { background: var(--accent); color: #000; border-color: var(--accent); }

/* Results & Favorites list */
.list-item { display: flex; align-items: center; padding: 14px 16px; border-bottom: 1px solid var(--border); cursor: pointer; }
.list-item:active { background: var(--border); }
.list-item .list-icon { font-size: 18px; margin-right: 12px; }
.list-item .list-text { flex: 1; }
.list-item .list-text .primary { font-size: 14px; font-weight: 600; }
.list-item .list-text .secondary { font-size: 12px; color: var(--muted); }
.list-item .action { padding: 6px 10px; border-radius: 6px; border: none; font-size: 18px; cursor: pointer; background: none; color: var(--red); }

/* Notifications */
.notif-item { padding: 14px 16px; border-bottom: 1px solid var(--border); }
.notif-item.alltime { background: #1a1200; border-left: 3px solid var(--gold); }
.notif-item .msg { font-size: 13px; font-weight: 600; }
.notif-item.alltime .msg { color: var(--gold); font-weight: 700; text-shadow: 0 0 6px rgba(255,190,11,0.3); }
.notif-item .time { font-size: 10px; color: var(--muted); margin-top: 4px; font-family: 'SF Mono', 'Fira Code', monospace; }

.empty-state { text-align: center; padding: 60px 30px; color: var(--muted); }
.empty-state .icon { font-size: 40px; margin-bottom: 12px; }
.empty-state .title { font-size: 16px; font-weight: 600; color: var(--text); margin-bottom: 6px; }

.pill-btn { display: inline-block; padding: 8px 16px; border-radius: 4px; border: none; font-size: 11px; font-weight: 700; cursor: pointer; transition: all 0.2s; text-transform: uppercase; letter-spacing: 0.5px; }
.pill-btn.primary { background: var(--accent); color: #000; box-shadow: 0 0 10px rgba(0,255,135,0.3); }
.pill-btn.outline { background: none; border: 1px solid var(--border); color: var(--muted); }
.pill-btn.outline:active { background: var(--accent); color: #000; border-color: var(--accent); }

/* Filter tabs row */
.filter-tabs { display: flex; gap: 6px; padding: 12px; overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
.filter-tabs::-webkit-scrollbar { display: none; }
.filter-tabs .pill-btn { white-space: nowrap; flex-shrink: 0; }

/* Stat section sub-headers inside cards */
.stat-section-label { padding: 10px 14px 4px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; color: var(--accent); background: var(--bg); }

/* Progress bars for record comparisons */
.record-compare { padding: 12px 14px; border-bottom: 1px solid var(--border); }
.record-compare .rc-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.record-compare .rc-stat { font-weight: 700; font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
.record-compare .rc-pct { font-size: 11px; color: var(--muted); font-family: 'SF Mono', 'Fira Code', monospace; }
.record-compare .rc-bar { background: var(--border); border-radius: 2px; height: 4px; margin-bottom: 6px; overflow: hidden; }
.record-compare .rc-bar-fill { height: 100%; border-radius: 2px; transition: width 0.5s ease; }
.record-compare .rc-detail { font-size: 10px; color: var(--muted); font-family: 'SF Mono', 'Fira Code', monospace; }
.record-compare .rc-sub { padding: 3px 14px 3px 28px; font-size: 10px; color: var(--muted); border-bottom: 1px solid var(--border); }

/* Pitch mix bars */
.pitch-mix-row { display: flex; align-items: center; padding: 10px 14px; border-bottom: 1px solid var(--border); gap: 10px; }
.pitch-mix-row .pm-type { width: 40px; font-weight: 700; font-size: 12px; color: var(--text); }
.pitch-mix-row .pm-bar { flex: 1; background: var(--border); border-radius: 4px; height: 8px; overflow: hidden; }
.pitch-mix-row .pm-bar-fill { height: 100%; border-radius: 2px; background: var(--accent); box-shadow: 0 0 4px var(--accent); }
.pitch-mix-row .pm-pct { width: 40px; text-align: right; font-size: 11px; color: var(--muted); font-family: 'SF Mono', 'Fira Code', monospace; }

/* Year by year rows */
.yby-row { padding: 12px 14px; border-bottom: 1px solid var(--border); }
.yby-row .yby-header { display: flex; justify-content: space-between; margin-bottom: 4px; }
.yby-row .yby-year { font-weight: 700; font-size: 14px; }
.yby-row .yby-team { font-size: 12px; color: var(--muted); }
.yby-row .yby-stats { display: flex; gap: 12px; font-size: 12px; flex-wrap: wrap; }
.yby-row .yby-stats b { color: var(--text); }

/* Smooth panel transitions */
.panel { animation: fadeIn 0.15s ease; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

/* Last game highlight card */
.last-game-card { background: var(--card); border-radius: 6px; margin: 8px 12px; border: 1px solid var(--border); overflow: hidden; }
.last-game-card .lg-header { padding: 10px 14px; background: #0a0a0a; border-bottom: 1px solid var(--border); font-size: 10px; font-weight: 700; color: var(--blue); text-transform: uppercase; letter-spacing: 1.5px; }
</style>
</head>
<body>

<!-- Scores Panel -->
<div id="scores" class="panel active">
  <div class="header"><h1>Scores</h1><div class="subtitle" id="scores-date"></div></div>
  <div id="scores-content"></div>
</div>

<!-- Favorites Panel -->
<div id="favorites" class="panel">
  <div class="header"><h1>Favorites</h1></div>
  <div class="search-container">
    <div class="search-bar"><input id="search-input" placeholder="Search players or teams"></div>
    <div class="search-btns"><button onclick="doSearch('player')">Search Players</button><button onclick="doSearch('team')">Search Teams</button></div>
  </div>
  <div id="search-results"></div>
  <div class="section-header">Your Teams</div>
  <div id="fav-teams"></div>
  <div class="section-header">Your Players</div>
  <div id="fav-players"></div>
</div>

<!-- Stats Panel -->
<div id="stats" class="panel">
  <div class="header"><h1>Stats</h1></div>
  <div id="stats-content"><div class="empty-state"><div class="icon">📊</div><div class="title">Player & Team Stats</div><div>Tap a favorite to view detailed stats</div></div></div>
</div>

<!-- Alerts Panel -->
<div id="alerts" class="panel">
  <div class="header">
    <h1>Alerts</h1>
    <div style="display:flex;gap:8px;margin-top:8px;">
      <button class="pill-btn primary" onclick="checkNotifs()">Check Now</button>
      <button class="pill-btn outline" onclick="clearNotifs()">Clear All</button>
    </div>
  </div>
  <div id="notif-content"></div>
</div>

<!-- Search Panel -->
<div id="search" class="panel">
  <div class="header"><h1>Search</h1></div>
  <div class="search-container">
    <div class="search-bar"><input id="global-search" placeholder="Search players or teams..." onkeydown="if(event.key==='Enter')globalSearch('player')"></div>
    <div class="search-btns"><button onclick="globalSearch('player')">Players</button><button onclick="globalSearch('team')">Teams</button></div>
  </div>
  <div id="global-results"></div>
</div>

<!-- Bottom Navigation -->
<div class="bottom-nav">
  <div class="nav-item active" onclick="switchTab('scores')"><span class="icon">⚾</span>Scores</div>
  <div class="nav-item" onclick="switchTab('search')"><span class="icon">🔍</span>Search</div>
  <div class="nav-item" onclick="switchTab('favorites')"><span class="icon">⭐</span>Favorites</div>
  <div class="nav-item" onclick="switchTab('stats')"><span class="icon">📊</span>Stats</div>
  <div class="nav-item" onclick="switchTab('alerts')"><span class="icon">🔔</span>Alerts</div>
</div>

<script>
let _currentPlayerId = null;

const playerImg = (id, size=40) => `<img src="https://img.mlbstatic.com/mlb-photos/image/upload/d_people:generic:headshot:67:current.png/w_213,q_auto:best/v1/people/${id}/headshot/67/current" style="width:${size}px;height:${size}px;border-radius:50%;object-fit:cover;background:var(--border)" onerror="this.style.display='none'">`;
const teamLogo = (id, size=24) => `<img src="https://www.mlbstatic.com/team-logos/${id}.svg" style="width:${size}px;height:${size}px" onerror="this.style.display='none'">`;

function switchTab(id) {
  document.querySelectorAll('.panel').forEach(p => p.classList.toggle('active', p.id===id));
  document.querySelectorAll('.nav-item').forEach((n,i) => {
    const tabs = ['scores','search','favorites','stats','alerts'];
    n.classList.toggle('active', tabs[i]===id);
  });
  if (id==='scores') loadScores();
  if (id==='favorites') loadFavorites();
  if (id==='alerts') loadNotifs();
}

// Scores
async function loadScores() {
  document.getElementById('scores-date').textContent = new Date().toLocaleDateString('en-US', {weekday:'long', month:'short', day:'numeric'});
  const r = await fetch('/api/live');
  const d = await r.json();
  let html = '';

  if (d.live.length) {
    html += '<div class="section-header">Live</div>';
    d.live.forEach(g => { html += gameCard(g, 'live'); });
  }
  if (d.upcoming.length) {
    html += '<div class="section-header">Upcoming Today</div>';
    d.upcoming.forEach(g => { html += gameCard(g, 'upcoming'); });
  }
  if (d.final.length) {
    html += '<div class="section-header">Final</div>';
    d.final.forEach(g => { html += gameCard(g, 'final'); });
  }
  if (!d.live.length && !d.upcoming.length && !d.final.length) html = '<div class="empty-state"><div class="icon">📅</div><div class="title">No Games Today</div></div>';

  // Next 3 upcoming games (future days)
  html += '<div class="section-header">Coming Up Next</div><div id="upcoming-preview"><div class="empty-state"><div class="icon">⏳</div><div>Loading...</div></div></div>';
  html += '<div style="padding:12px;text-align:center"><button class="pill-btn outline" onclick="loadAllUpcoming()">📅 See All Upcoming (2 Weeks)</button>&nbsp;<button class="pill-btn outline" onclick="loadHistoricalGames()">📅 Past 2 Weeks</button></div>';
  document.getElementById('scores-content').innerHTML = html;

  // Fetch next 3 async
  fetch('/api/upcoming').then(r=>r.json()).then(games => {
    const preview = games.slice(0, 3);
    let ph = '';
    if (preview.length) {
      preview.forEach(g => { ph += upcomingCard(g); });
    } else {
      ph = '<div class="empty-state"><div>No upcoming games scheduled</div></div>';
    }
    document.getElementById('upcoming-preview').innerHTML = ph;
  });
}

async function loadHistoricalGames() {
  document.getElementById('scores-content').innerHTML = '<div class="empty-state"><div class="icon">⏳</div><div>Loading past games...</div></div>';
  const r = await fetch('/api/games/history');
  const games = await r.json();
  let html = '<div class="section-header">Past 2 Weeks — Tap for Box Score</div>';
  let currentDate = '';
  games.forEach(g => {
    if (g.date !== currentDate) {
      currentDate = g.date;
      html += `<div class="section-header" style="padding-top:12px">${g.date}</div>`;
    }
    const awayWin = g.away_score > g.home_score;
    html += `<div class="game-card" onclick="loadBoxScore(${g.game_id})" style="cursor:pointer">
      <div class="game-status"><span>Final</span></div>
      <div class="team-row">${teamLogo(g.away_id)}<span class="team-name">${g.away}</span><span class="team-score ${awayWin?'winner':'loser'}">${g.away_score}</span></div>
      <div class="team-row">${teamLogo(g.home_id)}<span class="team-name">${g.home}</span><span class="team-score ${!awayWin?'winner':'loser'}">${g.home_score}</span></div>
    </div>`;
  });
  if (!games.length) html += '<div class="empty-state"><div>No games found</div></div>';
  html += '<div style="padding:12px;text-align:center"><button class="pill-btn outline" onclick="loadScores()">← Back to Today</button></div>';
  document.getElementById('scores-content').innerHTML = html;
}

function gameCard(g, status) {
  const awayWin = g.away_score > g.home_score;
  const homeWin = g.home_score > g.away_score;
  let statusText = '';
  if (status==='live') statusText = `<span class="live-dot">●</span> ${g.inning_state} ${g.inning}`;
  else if (status==='final') statusText = 'Final';
  else statusText = 'Scheduled';

  return `<div class="game-card" ${g.game_id && status!=='upcoming'?`onclick="loadBoxScore(${g.game_id})" style="cursor:pointer"`:''}> 
    <div class="game-status"><span>${statusText}</span>${g.fav?'<span class="fav-badge">★ FAV</span>':''}</div>
    <div class="team-row">${teamLogo(g.away_id)}<span class="team-name">${g.away}</span><span class="team-score ${status==='final'?(awayWin?'winner':'loser'):''}">${status!=='upcoming'?g.away_score:''}</span></div>
    <div class="team-row">${teamLogo(g.home_id)}<span class="team-name">${g.home}</span><span class="team-score ${status==='final'?(homeWin?'winner':'loser'):''}">${status!=='upcoming'?g.home_score:''}</span></div>
  </div>`;
}

function upcomingCard(g) {
  const dt = g.game_time ? new Date(g.game_time) : null;
  const dateStr = dt ? dt.toLocaleDateString('en-US', {weekday:'short', month:'short', day:'numeric'}) : g.game_date || '';
  const timeStr = dt ? dt.toLocaleTimeString('en-US', {hour:'numeric', minute:'2-digit'}) : 'TBD';
  return `<div class="game-card">
    <div class="game-status"><span>📅 ${dateStr} • ${timeStr}</span>${g.fav?'<span class="fav-badge">★ FAV</span>':''}</div>
    <div class="team-row">${teamLogo(g.away_id)}<span class="team-name">${g.away}</span></div>
    <div class="team-row">${teamLogo(g.home_id)}<span class="team-name">${g.home}</span></div>
  </div>`;
}

async function loadAllUpcoming() {
  document.getElementById('scores-content').innerHTML = '<div class="empty-state"><div class="icon">⏳</div><div>Loading upcoming games...</div></div>';
  const r = await fetch('/api/upcoming');
  const games = await r.json();
  let html = '<div class="section-header">Upcoming Games — Next 2 Weeks</div>';
  let currentDate = '';
  games.forEach(g => {
    const dt = g.game_time ? new Date(g.game_time) : null;
    const dateStr = dt ? dt.toLocaleDateString('en-US', {weekday:'long', month:'short', day:'numeric'}) : g.game_date || '';
    if (dateStr !== currentDate) {
      currentDate = dateStr;
      html += `<div class="section-header" style="padding-top:12px">${dateStr}</div>`;
    }
    html += upcomingCard(g);
  });
  if (!games.length) html += '<div class="empty-state"><div>No upcoming games scheduled</div></div>';
  html += '<div style="padding:12px;text-align:center"><button class="pill-btn outline" onclick="loadScores()">← Back to Today</button></div>';
  document.getElementById('scores-content').innerHTML = html;
}

// Favorites
async function loadFavorites() {
  const r = await fetch('/api/favorites');
  const d = await r.json();
  document.getElementById('fav-teams').innerHTML = d.teams.map(t =>
    `<div class="list-item" onclick="loadTeam(${t.id})">${teamLogo(t.id, 28)}<div class="list-text" style="margin-left:10px"><div class="primary">${t.name}</div></div><button class="action" onclick="event.stopPropagation();removeFav('team',${t.id})">×</button></div>`
  ).join('') || '<div class="empty-state"><div>No teams added yet</div></div>';
  document.getElementById('fav-players').innerHTML = d.players.map(p =>
    `<div class="list-item" onclick="loadPlayer(${p.id})">${playerImg(p.id, 32)}<div class="list-text" style="margin-left:10px"><div class="primary">${p.name}</div></div><button class="action" onclick="event.stopPropagation();removeFav('player',${p.id})">×</button></div>`
  ).join('') || '<div class="empty-state"><div>No players added yet</div></div>';
}

async function doSearch(type) {
  const q = document.getElementById('search-input').value;
  if (!q) return;
  const r = await fetch(`/api/search/${type}?q=${encodeURIComponent(q)}`);
  const d = await r.json();
  document.getElementById('search-results').innerHTML = d.map(item =>
    type==='player'

// Stats
let _teamRefreshTimer = null;
async function loadTeam(id) {
  if (_teamRefreshTimer) { clearInterval(_teamRefreshTimer); _teamRefreshTimer = null; }
  if (_liveRefreshTimer) { clearInterval(_liveRefreshTimer); _liveRefreshTimer = null; }
  if (_boxRefreshTimer) { clearInterval(_boxRefreshTimer); _boxRefreshTimer = null; }
  switchTab('stats');
  document.getElementById('stats-content').innerHTML = '<div class="empty-state"><div class="icon">⏳</div><div>Loading...</div></div>';
  const r = await fetch(`/api/team/${id}`);
  const d = await r.json();
  let html = '';
  if (d.live) {
    html += `<div class="game-card"><div class="game-status"><span class="live-dot">●</span> LIVE — ${d.live.inning_state} ${d.live.inning}</div>
      <div class="team-row"><span class="team-name">${d.live.away}</span><span class="team-score">${d.live.away_score}</span></div>
      <div class="team-row"><span class="team-name">${d.live.home}</span><span class="team-score">${d.live.home_score}</span></div></div>`;
    if (d.live.game_id) {
      html += `<div id="live-field-zone" class="player-card" style="padding:16px"><div class="loading">Loading field...</div></div>`;
      setTimeout(() => loadFieldAndZone(d.live.game_id), 100);
      html += `<div class="player-card"><a onclick="loadBoxScore(${d.live.game_id})" style="display:block;padding:14px 16px;color:var(--blue);text-decoration:none;font-weight:600;cursor:pointer">📊 View Live Box Score →</a>`;
      html += `<a href="https://www.mlb.com/gameday/${d.live.game_id}" target="_blank" style="display:block;padding:14px 16px;border-top:1px solid var(--border);color:var(--muted);text-decoration:none;font-size:12px">Open on MLB.com ↗</a></div>`;
    }
  }
  if (d.record.w !== undefined) {
    html += `<div class="record-bar">
      <div class="record-item"><div class="val">${d.record.w}-${d.record.l}</div><div class="lbl">Record</div></div>
      <div class="record-item"><div class="val">${d.record.rank}</div><div class="lbl">Division</div></div>
      <div class="record-item"><div class="val">${d.record.gb}</div><div class="lbl">GB</div></div>
    </div>`;
  }
  if (d.recent.length) {
    html += '<div class="section-header">Recent Games</div><div class="player-card">';
    d.recent.forEach(g => {
      const links = g.game_id ? ` <a onclick="loadBoxScore(${g.game_id})" style="color:var(--blue);text-decoration:none;font-size:11px;cursor:pointer">box→</a>` : '';
      html += `<div class="game-log-item"><div class="result ${g.won?'W':'L'}">${g.won?'W':'L'}</div><div class="info"><div class="opp">${g.home?'vs':'@'} ${g.opponent}</div><div class="date">${g.date}</div></div><div class="score">${g.score}${links}</div></div>`;
    });
    html += '</div>';
  }
  if (d.upcoming && d.upcoming.length) {
    const preview = d.upcoming.slice(0, 3);
    const rest = d.upcoming.slice(3);
    html += '<div class="section-header">Upcoming Games</div><div class="player-card">';
    preview.forEach(g => {
      const dt = g.game_time ? new Date(g.game_time) : null;
      const dateStr = dt ? dt.toLocaleDateString('en-US', {weekday:'short', month:'short', day:'numeric'}) : g.date || '';
      const timeStr = dt ? dt.toLocaleTimeString('en-US', {hour:'numeric', minute:'2-digit'}) : 'TBD';
      html += `<div class="game-log-item"><div class="result" style="background:var(--border);color:var(--text)">${g.home?'vs':'@'}</div><div class="info"><div class="opp">${g.opponent}</div><div class="date">${dateStr} • ${timeStr}</div></div>${g.opponent_id?teamLogo(g.opponent_id):''}</div>`;
    });
    if (rest.length) {
      html += `<div id="team-upcoming-rest" style="display:none">`;
      rest.forEach(g => {
        const dt = g.game_time ? new Date(g.game_time) : null;
        const dateStr = dt ? dt.toLocaleDateString('en-US', {weekday:'short', month:'short', day:'numeric'}) : g.date || '';
        const timeStr = dt ? dt.toLocaleTimeString('en-US', {hour:'numeric', minute:'2-digit'}) : 'TBD';
        html += `<div class="game-log-item"><div class="result" style="background:var(--border);color:var(--text)">${g.home?'vs':'@'}</div><div class="info"><div class="opp">${g.opponent}</div><div class="date">${dateStr} • ${timeStr}</div></div>${g.opponent_id?teamLogo(g.opponent_id):''}</div>`;
      });
      html += `</div><div style="padding:10px;text-align:center"><button class="pill-btn outline" onclick="document.getElementById('team-upcoming-rest').style.display='block';this.style.display='none'">Show All ${d.upcoming.length} Games ▼</button></div>`;
    }
    html += '</div>';
  }
  document.getElementById('stats-content').innerHTML = html;
  // Load roster/lineup async
  loadTeamRoster(id);
  // Auto-refresh if live game
  if (d.live) { _teamRefreshTimer = setInterval(() => { if (document.querySelector('#stats.active')) loadTeam(id); }, 15000); }
}

async function loadTeamRoster(teamId) {
  try {
    const r = await fetch(`/api/team/${teamId}/roster`);
    const d = await r.json();
    let html = '';
    if (d.lineup && d.lineup.length) {
      html += '<div class="section-header">Lineup</div><div class="player-card">';
      d.lineup.forEach((p, i) => {
        html += `<div class="list-item" onclick="loadPlayer(${p.id})">${playerImg(p.id, 28)}<div class="list-text" style="margin-left:10px"><div class="primary">${i+1}. ${p.name}</div><div class="secondary">${p.pos}</div></div></div>`;
      });
      html += '</div>';
    }
    if (d.roster && d.roster.length) {
      const groups = {};
      d.roster.forEach(p => { (groups[p.type] = groups[p.type] || []).push(p); });
      const order = ['Pitcher', 'Catcher', 'Infielder', 'Outfielder'];
      html += '<div class="section-header">Roster</div>';
      order.forEach(type => {
        if (!groups[type]) return;
        html += `<div class="player-card"><div class="stat-section-label">${type}s</div>`;
        groups[type].forEach(p => {
          html += `<div class="list-item" onclick="loadPlayer(${p.id})">${playerImg(p.id, 28)}<div class="list-text" style="margin-left:10px"><div class="primary">#${p.number} ${p.name}</div><div class="secondary">${p.pos}</div></div></div>`;
        });
        html += '</div>';
      });
    }
    if (html) {
      document.getElementById('stats-content').insertAdjacentHTML('beforeend', html);
    }
  } catch(e) {}
}

function loadTeamFull(id, name) { loadTeam(id); }

async function globalSearch(type) {
  const q = document.getElementById('global-search').value;
  if (!q) return;
  document.getElementById('global-results').innerHTML = '<div class="loading">Searching...</div>';
  const r = await fetch(`/api/search/${type}?q=${encodeURIComponent(q)}`);
  const d = await r.json();
  if (type === 'player') {
    document.getElementById('global-results').innerHTML = d.map(p =>
      `<div class="list-item" onclick="loadPlayer(${p.id})">${playerImg(p.id, 36)}<div class="list-text" style="margin-left:10px"><div class="primary">${p.name}</div><div class="secondary">${p.team}</div></div></div>`
    ).join('') || '<div class="empty-state"><div>No players found</div></div>';

      `<div class="list-item" onclick="loadTeamFull(${t.id},'${t.name.replace(/'/g,"\\'")}')"><span style="margin-right:10px">${teamLogo(t.id, 30)}</span><div class="list-text"><div class="primary">${t.name}</div></div></div>`

  }
}

      <div class="stat-cell"><div class="val">${s.baseOnBalls||0}</div><div class="lbl">BB</div></div>
      <div class="stat-cell"><div class="val">${s.strikeOuts||0}</div><div class="lbl">K</div></div>
      <div class="stat-cell"><div class="val">${s.hitByPitch||0}</div><div class="lbl">HBP</div></div>

      <div class="stat-cell"><div class="val">${s.caughtStealing||0}</div><div class="lbl">CS</div></div>
      <div class="stat-cell"><div class="val">${s.groundIntoDoublePlay||0}</div><div class="lbl">GIDP</div></div>
    </div>`;
  } else {
    html += `<div class="stat-section-label">Core</div><div class="stat-row">
      <div class="stat-cell"><div class="val">${s.era||'---'}</div><div class="lbl">ERA</div></div>

      <div class="stat-cell"><div class="val">${s.gamesPlayed||0}</div><div class="lbl">G</div></div>
      <div class="stat-cell"><div class="val">${s.gamesStarted||0}</div><div class="lbl">GS</div></div>
      <div class="stat-cell"><div class="val">${s.winPercentage||'---'}</div><div class="lbl">W%</div></div>
      <div class="stat-cell"><div class="val">${s.earnedRuns||0}</div><div class="lbl">ER</div></div>
    </div><div class="stat-section-label">Strikeouts & Walks</div><div class="stat-row">
      <div class="stat-cell"><div class="val">${s.strikeOuts||0}</div><div class="lbl">K</div></div>
      <div class="stat-cell"><div class="val">${s.baseOnBalls||0}</div><div class="lbl">BB</div></div>
      <div class="stat-cell"><div class="val">${s.strikeoutWalkRatio||'---'}</div><div class="lbl">K/BB</div></div>
      <div class="stat-cell"><div class="val">${s.strikeoutsPer9Inn||'---'}</div><div class="lbl">K/9</div></div>
      <div class="stat-cell"><div class="val">${s.walksPer9Inn||'---'}</div><div class="lbl">BB/9</div></div>
      <div class="stat-cell"><div class="val">${s.hitBatsmen||s.hitByPitch||0}</div><div class="lbl">HBP</div></div>

      <div class="stat-cell"><div class="val">${s.hits||0}</div><div class="lbl">H</div></div>
      <div class="stat-cell"><div class="val">${s.homeRuns||0}</div><div class="lbl">HR</div></div>
      <div class="stat-cell"><div class="val">${s.avg||'---'}</div><div class="lbl">BAA</div></div>
      <div class="stat-cell"><div class="val">${s.obp||'---'}</div><div class="lbl">OBP Agst</div></div>
      <div class="stat-cell"><div class="val">${s.hitsPer9Inn||'---'}</div><div class="lbl">H/9</div></div>
      <div class="stat-cell"><div class="val">${s.homeRunsPer9||'---'}</div><div class="lbl">HR/9</div></div>

      <div class="stat-cell"><div class="val">${s.wildPitches||0}</div><div class="lbl">WP</div></div>

  if (d.anomalies && d.anomalies.length) {

    });

  // Red flags — bad stats
  if (d.red_flags && d.red_flags.length) {
    html += '<div class="section-header">🚩 Red Flags</div>';
    d.red_flags.forEach(a => {
      html += `<div class="anomaly ${a.level}"><div>${a.level==='terrible'?'🚨 ':'⚠️ '}${a.msg}</div>${a.nugget?`<div style="font-size:11px;margin-top:4px;font-weight:400;opacity:0.85;font-style:italic">💡 ${a.nugget}</div>`:''}

    d.insights.forEach(i => {
      html += `<div class="anomaly alert" style="border-left-color:var(--muted)"><div>📌 ${i.msg}</div><div style="font-size:11px;margin-top:4px;font-weight:400;opacity:0.85;font-style:italic">💡 ${i.nugget}</div></div>`;
    });

  // Historical comparisons
  if (d.comparisons && d.comparisons.length) {
    html += '<div class="section-header">vs. Historical Records</div><div class="player-card">';
    d.comparisons.forEach(c => {
      if (c.stat) {
        const pct = Math.min(c.pct, 100);
        const barColor = pct >= 90 ? 'var(--gold)' : pct >= 70 ? 'var(--green)' : 'var(--blue)';
        html += `<div class="record-compare">
          <div class="rc-header"><span class="rc-stat">${c.stat}: <span style="color:var(--accent)">${c.current}</span></span><span class="rc-pct">${c.pct}% of record</span></div>

        html += `<div class="rc-sub">• ${c.record} — ${c.holder}</div>`;
      }
    });
    html += '</div>';
  }

  // Last game stats
  if (d.last_game && Object.keys(d.last_game).length) {
    const lg = d.last_game;
    html += '<div class="section-header">Last Game</div><div class="last-game-card"><div class="lg-header">Most Recent Performance</div><div class="stat-row">';
    if (d.position !== 'P') {
      html += `<div class="stat-cell${parseInt(lg.hits||0)>=3?' highlight':''}"><div class="val">${lg.hits||0}-${lg.atBats||0}</div><div class="lbl">H-AB</div></div>`;

      html += `<div class="stat-cell${parseInt(lg.rbi||0)>=3?' highlight':''}"><div class="val">${lg.rbi||0}</div><div class="lbl">RBI</div></div>`;
      html += `<div class="stat-cell"><div class="val">${lg.runs||0}</div><div class="lbl">R</div></div>`;
      html += `<div class="stat-cell"><div class="val">${lg.baseOnBalls||0}</div><div class="lbl">BB</div></div>`;
      html += `<div class="stat-cell"><div class="val">${lg.strikeOuts||0}</div><div class="lbl">K</div></div>`;
    } else {
      html += `<div class="stat-cell"><div class="val">${lg.inningsPitched||'0'}</div><div class="lbl">IP</div></div>`;
      html += `<div class="stat-cell${parseInt(lg.strikeOuts||0)>=8?' highlight':''}"><div class="val">${lg.strikeOuts||0}</div><div class="lbl">K</div></div>`;
      html += `<div class="stat-cell"><div class="val">${lg.earnedRuns||0}</div><div class="lbl">ER</div></div>`;
    }
    html += '</div></div>';
  }

  // Recent team games
  if (d.recent_games && d.recent_games.length) {
    html += '<div class="section-header">Recent Team Games</div><div class="player-card">';
    d.recent_games.forEach(g => {
      html += `<div class="game-log-item"><div class="result ${g.won?'W':'L'}">${g.won?'W':'L'}</div><div class="info"><div class="opp">${g.opponent||''}</div><div class="date">${g.date||''}</div></div><div class="score">${g.score||''}</div></div>`;
    });
    html += '</div>';
  }

  document.getElementById('stats-content').innerHTML = html;
}

    }
    // HOF pace comparisons
    if (d.pace_comps && d.pace_comps.length) {
      html += `<div class="section-header">HOF Pace Check — Through ${d.seasons_played} Seasons</div><div class="player-card">`;
      d.pace_comps.forEach(p => {
        const icon = p.ahead ? '🟢' : '🔵';
        const dir = p.ahead ? `+${p.diff} ahead of` : `${p.diff} behind`;
        html += `<div style="padding:8px 0;border-bottom:1px solid var(--border)"><div style="font-weight:600;font-size:13px">${icon} ${p.stat}: ${p.current} — ${dir} ${p.player}</div><div style="font-size:11px;color:var(--muted);margin-top:2px">${p.player} had ${p.hof_val} ${p.stat} through ${p.bracket} seasons</div></div>`;
      });
      html += '</div>';
    }
    // Career milestones checklist
    if (d.milestones && d.milestones.length) {
      html += '<div class="section-header">Career Milestones ✓</div><div class="player-card">';
      d.milestones.forEach(m => {
        html += `<div style="padding:10px 0;border-bottom:1px solid var(--border);display:flex;gap:10px;align-items:flex-start"><span style="color:var(--green);font-size:18px">✓</span><div><div style="font-weight:600;font-size:13px">${m.stat}</div>${m.note?`<div style="font-size:11px;color:var(--muted);margin-top:2px">${m.note}</div>`:''}</div></div>`;
      });
      html += '</div>';
    }
    document.getElementById('stats-content').innerHTML = html;
  } else {
    // yearByYear - fetch and show dropdown
    const r = await fetch(`/api/player/${_currentPlayerId}/yearByYear`);
    const d = await r.json();
    window._ybyData = d;
    let html = filterTabs('yearByYear');
    if (d.seasons && d.seasons.length) {
      html += `<div style="padding:12px"><select id="year-select" onchange="showYearDashboard()" style="width:100%;padding:12px;border-radius:10px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:15px;font-weight:600">`;
      html += d.seasons.slice().reverse().map(s => `<option value="${s._key}">${s.season} — ${s.team||'Unknown'}</option>`).join('');
      html += `</select></div>`;
      html += '<div id="year-dashboard"></div>';
      document.getElementById('stats-content').innerHTML = html;
      showYearDashboard();
    } else {
      html += '<div class="empty-state"><div>No historical data available</div></div>';
      document.getElementById('stats-content').innerHTML = html;
    }
  }
}

function showYearDashboard() {
  const key = document.getElementById('year-select').value;
  const d = window._ybyData;
  const s = d.seasons.find(x => x._key === key);
  if (!s) return;
  const year = s.season;
  const teamLogo = s.team_id ? `<img src="https://www.mlbstatic.com/team-logos/${s.team_id}.svg" style="width:36px;height:36px;border-radius:6px;background:var(--border);padding:2px" onerror="this.style.display='none'">` : '';
  const teamName = s.team || '';
  let html = `<div class="player-card"><div class="player-header" style="display:flex;align-items:center;gap:12px">${playerImg(_currentPlayerId, 50)}${teamLogo}<div><div class="name">${d.name}</div><div class="meta">${d.position} • ${teamName} • ${year}</div></div></div>`;
  html += buildStatDashboard(s, d.position);
  html += '</div>';
  // Show anomaly flags for this season
  if (d.anomalies) {
    const yearAnoms = d.anomalies.find(a => a._key === key);
    if (yearAnoms && yearAnoms.flags && yearAnoms.flags.length) {
      html += '<div class="section-header">🔥 Anomalies</div>';
      yearAnoms.flags.forEach(f => {
        html += `<div class="anomaly ${f.level}"><div>${f.level==='alltime'?'👑 ':'🔥 '}${f.msg}</div>${f.nugget?`<div style="font-size:11px;margin-top:4px;font-weight:400;opacity:0.85;font-style:italic">💡 ${f.nugget}</div>`:''}</div>`;
      });
    }
  }
  // Show red flags for this season
  if (d.red_flags) {
    const yearReds = d.red_flags.find(a => a._key === key);
    if (yearReds && yearReds.flags && yearReds.flags.length) {
      html += '<div class="section-header">🚩 Red Flags</div>';
      yearReds.flags.forEach(f => {
        html += `<div class="anomaly ${f.level}"><div>${f.level==='terrible'?'🚨 ':'⚠️ '}${f.msg}</div>${f.nugget?`<div style="font-size:11px;margin-top:4px;font-weight:400;opacity:0.85;font-style:italic">💡 ${f.nugget}</div>`:''}</div>`;
      });
    }
  }
  document.getElementById('year-dashboard').innerHTML = html;
}

let _liveRefreshTimer = null;

async function loadPlayerLive(id) {
  if (_liveRefreshTimer) clearInterval(_liveRefreshTimer);
  document.getElementById('stats-content').innerHTML = '<div class="empty-state"><div class="icon">⏳</div><div>Loading live data...</div></div>';
  await renderPlayerLive(id);
  _liveRefreshTimer = setInterval(() => { if (document.querySelector('#stats.active')) renderPlayerLive(id); }, 15000);
}

async function renderPlayerLive(id) {
  const r = await fetch(`/api/player/${id}/live`);
  const d = await r.json();
  let html = filterTabs('live');

  if (!d.playing) {
    html += `<div class="player-card"><div class="player-header"><div class="name">${d.name}</div><div class="meta">${d.position} • ${d.team}</div></div>
      <div class="empty-state" style="padding:30px"><div class="icon">💤</div><div class="title">No Game In Progress</div><div>${d.next_game||'No upcoming game found'}</div></div></div>`;
  } else {
    const g = d.game;
    html += `<div class="game-card"><div class="game-status"><span class="live-dot">●</span> LIVE — ${g.inning_state} ${g.inning}<span style="font-size:10px;color:var(--muted)">Updates every 15s</span></div>
      <div class="team-row"><span class="team-name">${g.away}</span><span class="team-score">${g.away_score}</span></div>
      <div class="team-row"><span class="team-name">${g.home}</span><span class="team-score">${g.home_score}</span></div></div>`;

    // Diamond + Strike Zone
    if (g.game_id) {
      html += `<div id="live-field-zone" class="player-card" style="padding:16px"><div class="loading">Loading field...</div></div>`;
      setTimeout(() => loadFieldAndZone(g.game_id), 100);
    }

    // Player's live game stats
    if (d.player_stats && Object.keys(d.player_stats).length) {
      const s = d.player_stats;
      html += `<div class="player-card"><div class="player-header"><div class="name">${d.name}</div><div class="meta">Today's Game Stats</div></div>`;
      html += buildStatDashboard(s, d.position);
      html += '</div>';
    }

    // Box score link
    if (g.game_id) {
      html += `<div class="section-header">Box Score</div>`;
      html += `<div class="player-card"><a onclick="loadBoxScore(${g.game_id})" style="display:block;padding:14px 16px;color:var(--blue);text-decoration:none;font-weight:600;cursor:pointer">📊 View Full Box Score →</a>`;
      html += `<a href="https://www.mlb.com/gameday/${g.game_id}" target="_blank" style="display:block;padding:14px 16px;border-top:1px solid var(--border);color:var(--muted);text-decoration:none;font-size:12px">Open on MLB.com ↗</a></div>`;
    }
  }
  document.getElementById('stats-content').innerHTML = html;
}

async function loadStatcast(id) {
  document.getElementById('stats-content').innerHTML = '<div class="empty-state"><div class="icon">⏳</div><div>Loading Statcast data...</div></div>';
  const r = await fetch(`/api/player/${id}/statcast`);
  const d = await r.json();

  let html = filterTabs('statcast');
  if (!d.available) {
    html += '<div class="empty-state"><div class="icon">📡</div><div class="title">Statcast Unavailable</div><div>Data may not be available for this player or time period</div></div>';
  } else {
    const m = d.metrics;
    html += '<div class="player-card"><div class="player-header"><div class="name">Statcast Metrics</div><div class="meta">Last 30 days</div></div><div class="stat-row">';
    if (m.avg_exit_velo !== undefined) {
      html += `<div class="stat-cell${m.avg_exit_velo>=90?' highlight':''}"><div class="val">${m.avg_exit_velo}</div><div class="lbl">Avg EV</div></div>`;
      html += `<div class="stat-cell${m.max_exit_velo>=110?' highlight':''}"><div class="val">${m.max_exit_velo}</div><div class="lbl">Max EV</div></div>`;
      html += `<div class="stat-cell"><div class="val">${m.avg_launch_angle}°</div><div class="lbl">LA</div></div>`;
      html += `<div class="stat-cell${m.hard_hit_pct>=45?' highlight':''}"><div class="val">${m.hard_hit_pct}%</div><div class="lbl">Hard Hit</div></div>`;
      if (m.barrel_pct != null) html += `<div class="stat-cell${m.barrel_pct>=10?' highlight':''}"><div class="val">${m.barrel_pct}%</div><div class="lbl">Barrel</div></div>`;
      html += `<div class="stat-cell"><div class="val">${m.total_batted_balls}</div><div class="lbl">BBE</div></div>`;
    }
    if (m.avg_bat_speed !== undefined) {
      html += `<div class="stat-cell${m.avg_bat_speed>=72?' highlight':''}"><div class="val">${m.avg_bat_speed}</div><div class="lbl">Bat Spd</div></div>`;
      html += `<div class="stat-cell"><div class="val">${m.max_bat_speed}</div><div class="lbl">Max Bat</div></div>`;
    }
    if (m.sprint_speed !== undefined) {
      html += `<div class="stat-cell${m.sprint_speed>=28?' highlight':''}"><div class="val">${m.sprint_speed}</div><div class="lbl">Sprint</div></div>`;
    }
    if (m.xBA !== undefined) {
      html += `<div class="stat-cell"><div class="val">${m.xBA.toFixed(3)}</div><div class="lbl">xBA</div></div>`;
    }
    if (m.xSLG !== undefined) {
      html += `<div class="stat-cell"><div class="val">${m.xSLG.toFixed(3)}</div><div class="lbl">xSLG</div></div>`;
    }
    // Pitcher metrics
    if (m.avg_velo !== undefined) {
      html += `<div class="stat-cell${m.avg_velo>=95?' highlight':''}"><div class="val">${m.avg_velo}</div><div class="lbl">Avg Velo</div></div>`;
      html += `<div class="stat-cell${m.max_velo>=100?' highlight':''}"><div class="val">${m.max_velo}</div><div class="lbl">Max Velo</div></div>`;
    }
    if (m.avg_spin_rate !== undefined) {
      html += `<div class="stat-cell"><div class="val">${m.avg_spin_rate}</div><div class="lbl">Spin RPM</div></div>`;
    }
    if (m.avg_exit_velo_against !== undefined) {
      html += `<div class="stat-cell"><div class="val">${m.avg_exit_velo_against}</div><div class="lbl">EV Agst</div></div>`;
      html += `<div class="stat-cell"><div class="val">${m.hard_hit_pct_against}%</div><div class="lbl">HH% Agst</div></div>`;
    }
    if (m.xBA_against !== undefined) {
      html += `<div class="stat-cell"><div class="val">${m.xBA_against.toFixed(3)}</div><div class="lbl">xBA Agst</div></div>`;
    }
    if (m.total_pitches !== undefined) {
      html += `<div class="stat-cell"><div class="val">${m.total_pitches}</div><div class="lbl">Pitches</div></div>`;
    }
    html += '</div></div>';
    // Pitch mix
    if (m.pitch_mix) {
      html += '<div class="section-header">Pitch Mix</div><div class="player-card">';
      Object.entries(m.pitch_mix).forEach(([type, pct]) => {
        html += `<div class="pitch-mix-row"><span class="pm-type">${type}</span><div class="pm-bar"><div class="pm-bar-fill" style="width:${pct}%"></div></div><span class="pm-pct">${pct}%</span></div>`;
      });
      html += '</div>';
    }
  }
  document.getElementById('stats-content').innerHTML = html;
}

function filterTabs(active) {
  const tabs = [
    {id:'season', label:'2026'},
    {id:'live', label:'🔴 Live'},
    {id:'career', label:'Career'},
    {id:'yearByYear', label:'Year by Year'},
    {id:'statcast', label:'⚡ Statcast'},
  ];
  return `<div class="filter-tabs">${tabs.map(t =>
    `<button onclick="loadPlayerFilter('${t.id}')" class="pill-btn ${active===t.id?'primary':'outline'}">${t.label}</button>`
  ).join('')}</div>`;
}

// Field Diamond + Strike Zone
async function loadFieldAndZone(gameId) {
  const el = document.getElementById('live-field-zone');
  if (!el) return;
  try {
    const r = await fetch(`/api/game/${gameId}/live`);
    const d = await r.json();
    if (!d.available) { el.innerHTML = '<div style="color:var(--muted);font-size:12px">Live field data unavailable</div>'; return; }

    const rn = d.runners;
    const ct = d.count;
    // Diamond SVG
    const baseColor = (on) => on ? 'var(--gold)' : 'var(--border)';
    let html = `<div style="display:flex;gap:16px;align-items:flex-start;flex-wrap:wrap;justify-content:center">`;
    // Diamond
    html += `<div style="text-align:center"><div style="font-size:11px;color:var(--muted);margin-bottom:6px;font-weight:600">${d.inning_half} ${d.inning}</div>
      <svg width="100" height="100" viewBox="0 0 100 100">
        <polygon points="50,15 85,50 50,85 15,50" fill="none" stroke="var(--border)" stroke-width="1.5"/>
        <rect x="43" y="8" width="14" height="14" transform="rotate(45 50 15)" fill="${baseColor(rn.second)}" stroke="var(--muted)" stroke-width="1"/>
        <rect x="78" y="43" width="14" height="14" transform="rotate(45 85 50)" fill="${baseColor(rn.first)}" stroke="var(--muted)" stroke-width="1"/>
        <rect x="8" y="43" width="14" height="14" transform="rotate(45 15 50)" fill="${baseColor(rn.third)}" stroke="var(--muted)" stroke-width="1"/>
        <rect x="45" y="80" width="10" height="10" fill="var(--muted)" rx="1"/>
      </svg>
      <div style="display:flex;gap:4px;justify-content:center;margin-top:8px">
        ${[...Array(3)].map((_,i) => `<div style="width:10px;height:10px;border-radius:50%;background:${i<ct.outs?'var(--red)':'var(--border)'}"></div>`).join('')}
      </div>
      <div style="font-size:10px;color:var(--muted);margin-top:4px">${ct.balls}-${ct.strikes} Count • ${ct.outs} Out</div>
    </div>`;

    // Strike Zone
    html += `<div style="text-align:center"><div style="font-size:11px;color:var(--muted);margin-bottom:6px;font-weight:600">Strike Zone</div>
      <svg width="120" height="140" viewBox="-2 0 4 5">
        <rect x="-0.83" y="1.5" width="1.66" height="2" fill="none" stroke="var(--muted)" stroke-width="0.03"/>
        <!-- Zone grid -->
        <line x1="-0.28" y1="1.5" x2="-0.28" y2="3.5" stroke="var(--border)" stroke-width="0.015"/>
        <line x1="0.28" y1="1.5" x2="0.28" y2="3.5" stroke="var(--border)" stroke-width="0.015"/>
        <line x1="-0.83" y1="2.17" x2="0.83" y2="2.17" stroke="var(--border)" stroke-width="0.015"/>
        <line x1="-0.83" y1="2.83" x2="0.83" y2="2.83" stroke="var(--border)" stroke-width="0.015"/>`;

    // Plot pitches
    if (d.pitches && d.pitches.length) {
      d.pitches.forEach((p, i) => {
        const isLast = i === d.pitches.length - 1;
        const color = p.call === 'S' || p.call === 'C' || p.call === 'T' ? 'var(--red)' : p.call === 'B' ? 'var(--green)' : p.call === 'X' || p.call === 'E' || p.call === 'D' ? 'var(--blue)' : 'var(--muted)';
        const radius = isLast ? '0.09' : '0.06';
        const opacity = isLast ? '1' : '0.5';
        html += `<circle cx="${p.x}" cy="${5 - p.y}" r="${radius}" fill="${color}" opacity="${opacity}"/>`;
      });
    }
    html += `</svg>
      <div style="display:flex;gap:8px;justify-content:center;margin-top:6px;font-size:9px">
        <span style="color:var(--red)">● Strike</span><span style="color:var(--green)">● Ball</span><span style="color:var(--blue)">● In Play</span>
      </div>
    </div>`;
    html += `</div>`;

    // Matchup
    if (d.batter || d.pitcher) {
      html += `<div style="text-align:center;margin-top:12px;padding-top:12px;border-top:1px solid var(--border);font-size:12px">
        <span style="color:var(--muted)">AB:</span> <b>${d.batter}</b> <span style="color:var(--muted)">vs</span> <b>${d.pitcher}</b>
        ${d.last_pitch.speed ? `<div style="margin-top:4px;color:var(--muted)">${d.last_pitch.description||''} — ${d.last_pitch.speed} mph</div>` : ''}
      </div>`;
    }
    el.innerHTML = html;
  } catch(e) { el.innerHTML = ''; }
}

// In-App Box Score
let _boxRefreshTimer = null;
async function loadBoxScore(gameId) {
  if (_boxRefreshTimer) clearInterval(_boxRefreshTimer);
  if (_liveRefreshTimer) { clearInterval(_liveRefreshTimer); _liveRefreshTimer = null; }
  if (_teamRefreshTimer) { clearInterval(_teamRefreshTimer); _teamRefreshTimer = null; }
  switchTab('stats');
  document.getElementById('stats-content').innerHTML = '<div class="empty-state"><div class="icon">⏳</div><div>Loading box score...</div></div>';
  await renderBoxScore(gameId);
  _boxRefreshTimer = setInterval(() => { if (document.querySelector('#stats.active')) renderBoxScore(gameId); }, 15000);
}

function renderDiamond(runners, count) {
  const on = 'var(--green)';
  const off = '#333';
  const first = runners.first ? on : off;
  const second = runners.second ? on : off;
  const third = runners.third ? on : off;
  // Balls/Strikes/Outs indicators
  let bso = '<div style="display:flex;gap:12px;margin-top:8px;font-size:11px;color:var(--muted)">';
  bso += '<span>B ';
  for (let i = 0; i < 4; i++) bso += `<span style="display:inline-block;width:8px;height:8px;border-radius:50%;margin-left:2px;background:${i < count.balls ? '#4caf50' : '#333'}"></span>`;
  bso += '</span><span>S ';
  for (let i = 0; i < 3; i++) bso += `<span style="display:inline-block;width:8px;height:8px;border-radius:50%;margin-left:2px;background:${i < count.strikes ? '#f44336' : '#333'}"></span>`;
  bso += '</span><span>O ';
  for (let i = 0; i < 3; i++) bso += `<span style="display:inline-block;width:8px;height:8px;border-radius:50%;margin-left:2px;background:${i < count.outs ? '#ff9800' : '#333'}"></span>`;
  bso += '</span></div>';
  return `<div style="display:flex;flex-direction:column;align-items:center">
    <svg width="80" height="80" viewBox="0 0 100 100">
      <rect x="35" y="10" width="30" height="30" rx="2" transform="rotate(45 50 25)" fill="${second}" stroke="#555" stroke-width="1.5"/>
      <rect x="55" y="30" width="30" height="30" rx="2" transform="rotate(45 70 45)" fill="${first}" stroke="#555" stroke-width="1.5"/>
      <rect x="15" y="30" width="30" height="30" rx="2" transform="rotate(45 30 45)" fill="${third}" stroke="#555" stroke-width="1.5"/>
      <polygon points="50,75 45,80 50,85 55,80" fill="#fff" stroke="#555" stroke-width="1"/>
    </svg>${bso}</div>`;
}

function renderStrikeZone(pitches, lastPitch) {
  if (!pitches || !pitches.length) return '';
  // Zone: pX ranges roughly -1.5 to 1.5, pZ roughly 1.5 to 3.5
  // Map to SVG 0-120 with zone box in center
  const w = 120, h = 140, pad = 20;
  const zoneL = pad, zoneR = w - pad, zoneT = pad, zoneB = h - pad;
  function mapX(px) { return pad + ((px + 1.5) / 3.0) * (w - 2*pad); }
  function mapY(pz) { return pad + ((3.8 - pz) / 2.6) * (h - 2*pad); }
  let dots = '';
  pitches.forEach((p, i) => {
    if (p.x === 0 && p.y === 0) return;
    const cx = mapX(p.x), cy = mapY(p.y);
    const isLast = i === pitches.length - 1;
    const color = p.call === 'C' ? '#f44336' : p.call === 'B' ? '#4caf50' : p.call === 'S' ? '#ff9800' : p.call === 'X' ? '#2196f3' : '#888';
    const r = isLast ? 6 : 4;
    const opacity = isLast ? 1 : 0.6;
    dots += `<circle cx="${cx}" cy="${cy}" r="${r}" fill="${color}" opacity="${opacity}" stroke="${isLast?'#fff':'none'}" stroke-width="${isLast?1.5:0}"/>`;
  });
  let desc = '';
  if (lastPitch && lastPitch.speed) {
    desc = `<div style="font-size:10px;color:var(--muted);margin-top:4px;text-align:center">${lastPitch.speed} mph ${lastPitch.type || ''} — ${lastPitch.call || ''}</div>`;
  }
  return `<div style="display:flex;flex-direction:column;align-items:center">
    <svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}">
      <rect x="${zoneL}" y="${zoneT}" width="${zoneR-zoneL}" height="${zoneB-zoneT}" fill="none" stroke="#555" stroke-width="1.5"/>
      <line x1="${zoneL+(zoneR-zoneL)/3}" y1="${zoneT}" x2="${zoneL+(zoneR-zoneL)/3}" y2="${zoneB}" stroke="#333" stroke-width="0.5"/>
      <line x1="${zoneL+2*(zoneR-zoneL)/3}" y1="${zoneT}" x2="${zoneL+2*(zoneR-zoneL)/3}" y2="${zoneB}" stroke="#333" stroke-width="0.5"/>
      <line x1="${zoneL}" y1="${zoneT+(zoneB-zoneT)/3}" x2="${zoneR}" y2="${zoneT+(zoneB-zoneT)/3}" stroke="#333" stroke-width="0.5"/>
      <line x1="${zoneL}" y1="${zoneT+2*(zoneB-zoneT)/3}" x2="${zoneR}" y2="${zoneT+2*(zoneB-zoneT)/3}" stroke="#333" stroke-width="0.5"/>
      ${dots}
    </svg>${desc}
    <div style="display:flex;gap:8px;font-size:9px;color:var(--muted);margin-top:2px">
      <span><span style="color:#f44336">●</span> Called</span>
      <span><span style="color:#ff9800">●</span> Swing</span>
      <span><span style="color:#4caf50">●</span> Ball</span>
      <span><span style="color:#2196f3">●</span> In Play</span>
    </div>
  </div>`;
}

async function renderBoxScore(gameId) {
  const r = await fetch(`/api/game/${gameId}/boxscore`);
  const d = await r.json();
  if (!d.available) { document.getElementById('stats-content').innerHTML = '<div class="empty-state"><div>Box score unavailable</div></div>'; return; }

  let html = `<div style="padding:12px 16px;font-size:11px;color:var(--muted)">Auto-refreshes every 15s</div>`;

  // Linescore
  html += `<div class="player-card" style="overflow-x:auto"><pre style="padding:12px;font-size:11px;color:var(--text);white-space:pre;font-family:monospace;margin:0">${d.linescore}</pre></div>`;

  // Live diamond + strike zone (only for in-progress games)
  try {
    const lr = await fetch(`/api/game/${gameId}/live`);
    const live = await lr.json();
    if (live.available) {
      html += `<div class="player-card" style="padding:16px;display:flex;align-items:flex-start;justify-content:center;gap:24px;flex-wrap:wrap">`;
      html += `<div style="text-align:center">`;
      html += `<div style="font-size:11px;color:var(--muted);margin-bottom:6px">${live.inning_half || ''} ${live.inning || ''}</div>`;
      html += renderDiamond(live.runners, live.count);
      html += `<div style="margin-top:8px;font-size:12px;font-weight:600;color:var(--text)">${live.batter || ''}</div>`;
      html += `<div style="font-size:11px;color:var(--muted)">vs ${live.pitcher || ''}</div>`;
      html += `</div>`;
      html += `<div style="text-align:center">`;
      html += `<div style="font-size:11px;color:var(--muted);margin-bottom:6px">Strike Zone</div>`;
      html += renderStrikeZone(live.pitches, live.last_pitch);
      html += `</div>`;
      html += `</div>`;
    }
  } catch(e) {}

  // Away Batting
  html += `<div class="section-header">${teamLogo(d.away_id)} ${d.away_team} — Batting</div>`;
  html += `<div class="player-card" style="overflow-x:auto"><table style="width:100%;font-size:12px;border-collapse:collapse">`;
  html += `<tr style="color:var(--muted);text-align:center;border-bottom:1px solid var(--border)"><th style="text-align:left;padding:8px">Batter</th><th>AB</th><th>R</th><th>H</th><th>RBI</th><th>BB</th><th>K</th><th>AVG</th></tr>`;
  d.away_batters.forEach(b => {
    html += `<tr style="border-bottom:1px solid var(--border);text-align:center"><td style="text-align:left;padding:8px;font-weight:500">${playerImg(b.id,20)} ${b.name} <span style="color:var(--muted);font-size:10px">${b.pos}</span></td><td>${b.ab}</td><td>${b.r}</td><td>${b.h}</td><td>${b.rbi}</td><td>${b.bb}</td><td>${b.k}</td><td style="color:var(--muted)">${b.avg}</td></tr>`;
  });
  html += `</table></div>`;

  // Home Batting
  html += `<div class="section-header">${teamLogo(d.home_id)} ${d.home_team} — Batting</div>`;
  html += `<div class="player-card" style="overflow-x:auto"><table style="width:100%;font-size:12px;border-collapse:collapse">`;
  html += `<tr style="color:var(--muted);text-align:center;border-bottom:1px solid var(--border)"><th style="text-align:left;padding:8px">Batter</th><th>AB</th><th>R</th><th>H</th><th>RBI</th><th>BB</th><th>K</th><th>AVG</th></tr>`;
  d.home_batters.forEach(b => {
    html += `<tr style="border-bottom:1px solid var(--border);text-align:center"><td style="text-align:left;padding:8px;font-weight:500">${playerImg(b.id,20)} ${b.name} <span style="color:var(--muted);font-size:10px">${b.pos}</span></td><td>${b.ab}</td><td>${b.r}</td><td>${b.h}</td><td>${b.rbi}</td><td>${b.bb}</td><td>${b.k}</td><td style="color:var(--muted)">${b.avg}</td></tr>`;
  });
  html += `</table></div>`;

  // Away Pitching
  html += `<div class="section-header">${teamLogo(d.away_id)} ${d.away_team} — Pitching</div>`;
  html += `<div class="player-card" style="overflow-x:auto"><table style="width:100%;font-size:12px;border-collapse:collapse">`;
  html += `<tr style="color:var(--muted);text-align:center;border-bottom:1px solid var(--border)"><th style="text-align:left;padding:8px">Pitcher</th><th>IP</th><th>H</th><th>R</th><th>ER</th><th>BB</th><th>K</th><th>ERA</th></tr>`;
  d.away_pitchers.forEach(p => {
    html += `<tr style="border-bottom:1px solid var(--border);text-align:center"><td style="text-align:left;padding:8px;font-weight:500">${playerImg(p.id,20)} ${p.name}</td><td>${p.ip}</td><td>${p.h}</td><td>${p.r}</td><td>${p.er}</td><td>${p.bb}</td><td>${p.k}</td><td style="color:var(--muted)">${p.era}</td></tr>`;
  });
  html += `</table></div>`;

  // Home Pitching
  html += `<div class="section-header">${teamLogo(d.home_id)} ${d.home_team} — Pitching</div>`;
  html += `<div class="player-card" style="overflow-x:auto"><table style="width:100%;font-size:12px;border-collapse:collapse">`;
  html += `<tr style="color:var(--muted);text-align:center;border-bottom:1px solid var(--border)"><th style="text-align:left;padding:8px">Pitcher</th><th>IP</th><th>H</th><th>R</th><th>ER</th><th>BB</th><th>K</th><th>ERA</th></tr>`;
  d.home_pitchers.forEach(p => {
    html += `<tr style="border-bottom:1px solid var(--border);text-align:center"><td style="text-align:left;padding:8px;font-weight:500">${playerImg(p.id,20)} ${p.name}</td><td>${p.ip}</td><td>${p.h}</td><td>${p.r}</td><td>${p.er}</td><td>${p.bb}</td><td>${p.k}</td><td style="color:var(--muted)">${p.era}</td></tr>`;
  });
  html += `</table></div>`;

  // External links
  html += `<div class="player-card" style="margin-top:8px"><a href="https://www.mlb.com/gameday/${gameId}" target="_blank" style="display:block;padding:12px 16px;color:var(--blue);text-decoration:none;font-weight:600;font-size:13px">View on MLB.com →</a></div>`;

  document.getElementById('stats-content').innerHTML = html;
}

// Notifications
async function loadNotifs() {
  const r = await fetch('/api/notifications');
  const d = await r.json();
  if (!d.length) {
    document.getElementById('notif-content').innerHTML = `<div class="empty-state"><div class="icon">🔔</div><div class="title">No Alerts Yet</div><div>You'll be notified when your favorites<br>do something statistically anomalous</div><div style="margin-top:16px;color:var(--gold)">👑 Gold = All-time historic territory</div></div>`;
    return;
  }
  document.getElementById('notif-content').innerHTML = d.map(n =>
    `<div class="notif-item ${n.category||'alert'}"><div class="msg">${n.message}</div><div class="time">${n.time}</div></div>`
  ).join('');
}
async function checkNotifs() { await fetch('/api/notifications'); loadNotifs(); }
async function clearNotifs() { await fetch('/api/notifications/clear',{method:'POST'}); loadNotifs(); }

// Auto-refresh
setInterval(() => { if (document.querySelector('#scores.active')) loadScores(); }, 15000);
loadScores();
</script>
